services:

  # ─── Prometheus — coleta as métricas dos serviços Atlas ──────
  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: atlas-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-lifecycle"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks: [atlas-network]
    restart: unless-stopped

  # ─── Grafana — dashboards (login: admin / atlas) ────────────
  grafana:
    image: grafana/grafana:11.3.0
    container_name: atlas-grafana
    environment:
      - GF_SECURITY_ADMIN_USER=${GF_SECURITY_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD:-atlas}
      # Só o admin é criado no bootstrap; cadastro público desligado.
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    networks: [atlas-network]
    restart: unless-stopped

volumes:
  prometheus_data:
  grafana_data:

# A rede é criada pelo stack principal (atlas-infra). Aqui ela entra como
# EXTERNA: o Prometheus precisa resolver os containers dos serviços pelo nome
# (auth-service, feed-service, ...) para raspar o /metrics de cada um.
networks:
  atlas-network:
    name: atlas-network
    external: true
