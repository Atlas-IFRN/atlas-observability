name: Deploy observability to production

# Sobe/atualiza o stack de observabilidade (Prometheus + Grafana) no servidor.
# Dispara no push para main (producao) e manualmente. O stack e SEPARADO do
# atlas-infra: mora em /home/production/observability e anexa-se a rede externa
# atlas-network (criada pelo stack principal — este precisa estar no ar).
on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-observability
  cancel-in-progress: false

jobs:
  deploy:
    name: SSH deploy (observability)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host:     ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          script_stop: true
          command_timeout: 15m
          # Script straight-line (sem if/pipeline/continuacao) — o mesmo estilo
          # dos outros deploys, que roda bem no sh do servidor via drone-ssh.
          # Clona do zero a cada deploy: os dados de Prometheus/Grafana ficam em
          # VOLUMES docker (nao no diretorio), entao recriar o checkout e idempotente.
          script: |
            set -e
            echo "==> Deploy observabilidade $(date '+%Y-%m-%d %H:%M:%S')"
            rm -rf /home/production/observability
            git clone https://github.com/Atlas-IFRN/atlas-observability.git /home/production/observability
            cd /home/production/observability
            docker compose up -d --remove-orphans
            docker image prune -f
            docker compose ps
            echo "OK observabilidade atualizada"
